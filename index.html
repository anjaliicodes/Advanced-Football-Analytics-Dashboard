<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pro Analytics Engine</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  
  <style>
    /* 1. SCALABLE CSS VARIABLES */
    :root {
      --bg-base: #0a0e17;
      --bg-surface: #131b2c;
      --bg-surface-hover: #1c273f;
      --text-main: #e2e8f0;
      --text-muted: #94a3b8;
      --accent-glow: #00f0ff;
      --accent-secondary: #8b5cf6;
      --border-color: rgba(255, 255, 255, 0.05);
      --transition-speed: 0.3s;
    }

    body {
      margin: 0;
      font-family: 'Inter', system-ui, sans-serif;
      background-color: var(--bg-base);
      color: var(--text-main);
      overflow-x: hidden;
    }

    /* 2. MODERN CSS GRID LAYOUT */
    .app-layout {
      display: grid;
      grid-template-columns: 260px 1fr;
      min-height: 100vh;
    }

    /* SIDEBAR */
    .sidebar {
      background: var(--bg-surface);
      border-right: 1px solid var(--border-color);
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
    }

    .brand {
      font-size: 1.2rem;
      font-weight: 800;
      letter-spacing: 1px;
      color: var(--text-main);
      margin-bottom: 2.5rem;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .brand i { color: var(--accent-glow); font-size: 1.5rem; }

    .nav-menu {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .nav-btn {
      background: transparent;
      border: 1px solid transparent;
      color: var(--text-muted);
      padding: 0.8rem 1rem;
      border-radius: 8px;
      text-align: left;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: all var(--transition-speed);
    }

    .nav-btn:hover, .nav-btn.active {
      background: rgba(0, 240, 255, 0.05);
      color: var(--accent-glow);
      border-color: rgba(0, 240, 255, 0.2);
      box-shadow: inset 0 0 10px rgba(0, 240, 255, 0.05);
    }

    /* MAIN CONTENT */
    .main-content {
      padding: 2rem 3rem;
      height: 100vh;
      overflow-y: auto;
      box-sizing: border-box;
    }

    .header-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2.5rem;
    }

    .header-bar h1 { margin: 0; font-size: 1.8rem; font-weight: 600; }

    .btn-action {
      background: rgba(0, 240, 255, 0.1);
      color: var(--accent-glow);
      border: 1px solid rgba(0, 240, 255, 0.3);
      padding: 0.6rem 1.2rem;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all 0.2s;
    }

    .btn-action:hover {
      background: var(--accent-glow);
      color: var(--bg-base);
      box-shadow: 0 0 15px rgba(0, 240, 255, 0.4);
    }

    /* 3. TELEMETRY CARDS */
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 1.5rem;
      margin-bottom: 2.5rem;
    }

    .kpi-card {
      background: var(--bg-surface);
      border: 1px solid var(--border-color);
      padding: 1.5rem;
      border-radius: 12px;
      position: relative;
      overflow: hidden;
    }

    .kpi-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; width: 4px; height: 100%;
      background: var(--accent-glow);
      opacity: 0.5;
    }

    .kpi-title {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
    }

    .kpi-value {
      font-size: 2.2rem;
      font-weight: 700;
      margin: 0;
      display: flex;
      align-items: baseline;
      gap: 8px;
    }

    .trend {
      font-size: 0.85rem;
      color: #10b981; /* Emerald green */
    }

    /* CHARTS SECTION */
    .charts-grid {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 1.5rem;
    }

    .chart-container {
      background: var(--bg-surface);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 1.5rem;
    }

    .chart-container h3 { margin-top: 0; font-size: 1.1rem; color: var(--text-muted); }

    .hidden { display: none; }

    /* Custom Scrollbar */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: var(--bg-base); }
    ::-webkit-scrollbar-thumb { background: var(--bg-surface-hover); border-radius: 4px; }
  </style>
</head>
<body>

  <div class="app-layout">
    <aside class="sidebar">
      <div class="brand">
        <i class="ph-fill ph-hexagon"></i>
        CITY ANALYTICS
      </div>
      <div class="nav-menu">
        <button class="nav-btn active" data-target="dashboard-view">
          <i class="ph ph-squares-four"></i> Telemetry
        </button>
        <button class="nav-btn" data-target="player-view">
          <i class="ph ph-users"></i> Squad Data
        </button>
      </div>
    </aside>

    <main class="main-content">
      <header class="header-bar">
        <h1>Overview Performance</h1>
        <button id="sync-data" class="btn-action">
          <i class="ph ph-arrows-clockwise"></i> Sync Fetch
        </button>
      </header>

      <section id="dashboard-view" class="view-section">
        <div class="kpi-grid">
          <div class="kpi-card">
            <div class="kpi-title">Expected Goals (xG)</div>
            <div class="kpi-value" id="val-xg">88.4 <span class="trend">↑ +2.1</span></div>
          </div>
          <div class="kpi-card">
            <div class="kpi-title">Possession Control</div>
            <div class="kpi-value" id="val-poss">65.2% <span class="trend" style="color: #ef4444;">↓ -1.0</span></div>
          </div>
          <div class="kpi-card">
            <div class="kpi-title">PPDA (Pressing)</div>
            <div class="kpi-value">9.8 <span class="trend">↑ Optimal</span></div>
          </div>
        </div>

        <div class="charts-grid">
          <div class="chart-container">
            <h3>xG vs Actual Goals (Last 10 Matches)</h3>
            <canvas id="performanceChart" height="100"></canvas>
          </div>
          <div class="chart-container">
            <h3>Attack Distribution</h3>
            <canvas id="attackChart" height="200"></canvas>
          </div>
        </div>
      </section>

      <section id="player-view" class="view-section hidden">
        <div class="chart-container">
          <h3>Advanced Player Metrics Module</h3>
          <p style="color: var(--text-muted)">Connect to database to render detailed player tables...</p>
        </div>
      </section>

    </main>
  </div>

  <script>
    // --- 1. ARCHITECTURE: State Management ---
    const AppState = {
      isLoading: false,
      currentView: 'dashboard-view',
      charts: {}
    };

    // --- 2. CHART INITIALIZATION (Chart.js) ---
    function initCharts() {
      // Global Chart Config for Dark Theme
      Chart.defaults.color = '#94a3b8';
      Chart.defaults.borderColor = 'rgba(255, 255, 255, 0.05)';

      // Line Chart (Performance)
      const ctxLine = document.getElementById('performanceChart').getContext('2d');
      AppState.charts.performance = new Chart(ctxLine, {
        type: 'line',
        data: {
          labels: ['M1', 'M2', 'M3', 'M4', 'M5', 'M6', 'M7', 'M8', 'M9', 'M10'],
          datasets: [{
            label: 'Actual Goals',
            data: [2, 3, 1, 4, 2, 3, 5, 2, 1, 3],
            borderColor: '#00f0ff',
            backgroundColor: 'rgba(0, 240, 255, 0.1)',
            borderWidth: 2,
            tension: 0.4,
            fill: true
          }, {
            label: 'Expected Goals (xG)',
            data: [1.8, 2.5, 1.2, 3.1, 2.8, 2.9, 3.5, 2.1, 1.5, 2.8],
            borderColor: '#8b5cf6',
            borderDash: [5, 5],
            borderWidth: 2,
            tension: 0.4
          }]
        },
        options: { responsive: true, plugins: { legend: { position: 'top' } } }
      });

      // Doughnut Chart (Attack Flanks)
      const ctxDoughnut = document.getElementById('attackChart').getContext('2d');
      AppState.charts.attack = new Chart(ctxDoughnut, {
        type: 'doughnut',
        data: {
          labels: ['Left Flank', 'Center', 'Right Flank'],
          datasets: [{
            data: [35, 25, 40],
            backgroundColor: ['#00f0ff', '#10b981', '#8b5cf6'],
            borderWidth: 0
          }]
        },
        options: { cutout: '75%', responsive: true }
      });
    }

    // --- 3. UI CONTROLLERS ---
    function setupNavigation() {
      const navBtns = document.querySelectorAll('.nav-btn');
      navBtns.forEach(btn => {
        btn.addEventListener('click', (e) => {
          // Update Active States
          navBtns.forEach(b => b.classList.remove('active'));
          e.currentTarget.classList.add('active');

          // Switch Views
          const targetId = e.currentTarget.getAttribute('data-target');
          document.querySelectorAll('.view-section').forEach(sec => sec.classList.add('hidden'));
          document.getElementById(targetId).classList.remove('hidden');
        });
      });
    }

    function setupDataSync() {
      const syncBtn = document.getElementById('sync-data');
      syncBtn.addEventListener('click', () => {
        if(AppState.isLoading) return;
        
        AppState.isLoading = true;
        const originalIcon = syncBtn.innerHTML;
        syncBtn.innerHTML = `<i class="ph ph-spinner-gap" style="animation: spin 1s linear infinite;"></i> Syncing...`;

        // Simulate API Fetch
        setTimeout(() => {
          document.getElementById('val-xg').innerHTML = `${(Math.random() * 10 + 80).toFixed(1)} <span class="trend">↑ Updated</span>`;
          
          // Randomize chart data slightly
          const newData = AppState.charts.performance.data.datasets[0].data.map(val => val + Math.floor(Math.random() * 3 - 1));
          AppState.charts.performance.data.datasets[0].data = newData;
          AppState.charts.performance.update();

          syncBtn.innerHTML = originalIcon;
          AppState.isLoading = false;
        }, 800);
      });
    }

    // --- 4. APP BOOTSTRAP ---
    document.addEventListener('DOMContentLoaded', () => {
      initCharts();
      setupNavigation();
      setupDataSync();
      
      // Inject simple spinner animation
      const style = document.createElement('style');
      style.textContent = `@keyframes spin { 100% { transform: rotate(360deg); } }`;
      document.head.appendChild(style);
    });
  </script>
</body>
</html>
